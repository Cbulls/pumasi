server:
  port: 8080
  tomcat:
    # JSON API는 SecurityHeadersFilter 256KB 가드. 파일 업로드는 multipart 상한 사용.
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

pmsi:
  upload:
    dir: ${PMSI_UPLOAD_DIR:./uploads}
  storage:
    # local | s3 — s3면 아래 s3.* 필수
    mode: ${PMSI_STORAGE_MODE:local}
    s3:
      bucket: ${PMSI_S3_BUCKET:}
      region: ${PMSI_S3_REGION:ap-northeast-2}
      # S3 호환 스토리지(MinIO 등)용. 비우면 AWS 기본
      endpoint: ${PMSI_S3_ENDPOINT:}
  auth:
    # true: 비밀번호 없는 데모 계정 로그인 허용(개발/시연 전용). 프로덕션은 반드시 false.
    demo-enabled: ${PMSI_DEMO_AUTH:true}
  credit:
    # 베타: Fake 충전 API 활성화. 실PG 도입 시 false로 전환.
    fake-purchase-enabled: ${PMSI_FAKE_PURCHASE:true}
  cors:
    # 콤마 구분 오리진 목록
    allowed-origins: ${PMSI_CORS_ORIGINS:http://localhost:3000}

spring:
  application:
    name: pumasi-egov
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB
  datasource:
    url: ${PMSI_DB_URL:jdbc:postgresql://localhost:5432/pumasi}
    username: ${PMSI_DB_USER:pumasi}
    password: ${PMSI_DB_PASSWORD:pumasi}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    # 개인정보(응답 답변 등)가 로그에 남지 않도록 상세 로깅을 낮춘다.
    egovframework.pmsi: INFO
    org.mybatis: WARN
    # MyBatis가 바인딩 파라미터를 찍지 않도록 매퍼 로거도 억제
    egovframework.pmsi.form.service.impl.FormDAO: WARN
    egovframework.pmsi.response.service.impl.ResponseDAO: WARN
