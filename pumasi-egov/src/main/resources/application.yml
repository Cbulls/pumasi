server:
  port: 8080

spring:
  application:
    name: pumasi-egov
  datasource:
    url: jdbc:postgresql://localhost:5432/pumasi
    username: pumasi
    password: pumasi
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    egovframework.pmsi: DEBUG
    org.mybatis: INFO
