server:
  port: 8080
  tomcat:
    # JSON API는 SecurityHeadersFilter 256KB 가드. 파일 업로드는 multipart 상한 사용.
    max-http-form-post-size: 6MB
    max-swallow-size: 6MB

pmsi:
  upload:
    dir: ./uploads

spring:
  application:
    name: pumasi-egov
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:postgresql://localhost:5432/pumasi
    username: pumasi
    password: pumasi
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    # 개인정보(응답 답변 등)가 로그에 남지 않도록 상세 로깅을 낮춘다.
    egovframework.pmsi: INFO
    org.mybatis: WARN
    # MyBatis가 바인딩 파라미터를 찍지 않도록 매퍼 로거도 억제
    egovframework.pmsi.form.service.impl.FormDAO: WARN
    egovframework.pmsi.response.service.impl.ResponseDAO: WARN
