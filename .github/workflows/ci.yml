name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Test
        working-directory: pumasi-egov
        run: gradle test --no-daemon

  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pumasi-web/package-lock.json
      - name: Install
        working-directory: pumasi-web
        run: npm ci
      - name: Build
        working-directory: pumasi-web
        run: npm run build
